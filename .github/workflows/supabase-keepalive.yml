name: Supabase Keepalive

on:
  schedule:
    # Runs every 5 days at 08:00 UTC — well within Supabase's 7-day pause window.
    - cron: "0 8 */5 * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_KEEPALIVE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEEPALIVE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_KEEPALIVE_URL or SUPABASE_KEEPALIVE_ANON_KEY secret"
            exit 1
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/users?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Ping failed with HTTP $STATUS"
            exit 1
          fi
          echo "Supabase is alive."
